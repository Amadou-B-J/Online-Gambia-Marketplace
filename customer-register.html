<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Customer Registration | OGM

</title>

<link rel="stylesheet"
href="style.css">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

</head>

<body>

<div class="container">

<header>

<a href="index.html"
class="logo">

<img
src="images/Website Logo.png"
alt="OGM Logo">

</a>

<nav>

<ul>

<li>

<a href="index.html">

Home

</a>

</li>

<li>

<a href="contact.html">

Contact Us

</a>

</li>

</ul>

</nav>

</header>


<section class="form-section">

<div class="form-container">

<h1>

Customer Registration

</h1>

<p>

Create your Online Gambia Marketplace account.

</p>

<form id="customer-register-form">

<input
type="text"
placeholder="Full Name"
required>

<input
id="email"
type="email"
placeholder="Email Address"
required>

<input
type="tel"
placeholder="Phone Number"
required>

<input
type="text"
placeholder="Home Address"
required>

<input
id="password"
type="password"
placeholder="Password"
required>

<input
id="confirm-password"
type="password"
placeholder="Confirm Password"
required>

<p id="password-message"></p>

<button>

Create Account

</button type="submit">

</form>

<p class="login-link">

Already have an account?

<a href="customer-login.html">

Login

</a>

</p>

</div>

</section>


<footer>

<p>

© 2026 Online Gambia Marketplace

</p>

</footer>

</div>

<script src="script.js"></script>

</body>

</html>
