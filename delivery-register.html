<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Delivery Registration | OGM

</title>

<link rel="stylesheet"
href="style.css">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

</head>

<body>

<div class="container">

<header>

<a href="index.html"
class="logo">

<img
src="images/Website Logo.png"
alt="OGM Logo">

</a>

<nav>

<ul>

<li>

<a href="index.html">

Home

</a>

</li>

<li>

<a href="contact.html">

Contact Us

</a>

</li>

</ul>

</nav>

</header>


<section class="form-section">

<div class="form-container">

<h1>

Delivery Registration

</h1>

<p>

Apply to join the OGM Delivery Network.

</p>

<form id="delivery-register-form">

<input
type="text"
placeholder="Full Name"
required>

<input
id="email"
type="email"
placeholder="Email Address"
required>

<input
type="tel"
placeholder="Phone Number"
required>

<input
type="text"
placeholder="National ID Number"
required>

<input
type="text"
placeholder="Driver License Number"
required>

<select required>

<option>

Vehicle Type

</option>

<option>

Motorbike

</option>

<option value="" selected disabled>

Car

</option>

<option>

Van

</option>

</select>

<input
type="text"
placeholder="Region"
required>

<input
id="delivery-password"
type="password"
placeholder="Password"
required>

<p id="delivery-password-message"></p>

<input
id="delivery-confirm-password"
type="password"
placeholder="Confirm Password"
required>

<button type="submit">

Submit Application

</button>

</form>

<div class="notice">

Delivery applications require verification.

</div>

<p class="login-link">

Already approved?

<a href="delivery-login.html">

Login

</a>

</p>

</div>

</section>


<footer>

<p>

© 2026 Online Gambia Marketplace

</p>

</footer>

</div>

<script src="script.js"></script>

</body>

</html>
