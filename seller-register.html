<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Seller Registration | OGM

</title>

<link rel="stylesheet"
href="style.css">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

</head>

<body>

<div class="container">

<header>

<a href="index.html"
class="logo">

<img
src="images/Website Logo.png"
alt="OGM Logo">

</a>

<nav>

<ul>

<li>

<a href="index.html">

Home

</a>

</li>

<li>

<a href="contact.html">

Contact Us

</a>

</li>

</ul>

</nav>

</header>


<section class="form-section">

<div class="form-container">

<h1>

Seller Registration

</h1>

<p>

Submit your application to become an OGM Seller.

</p>

<form id="seller-register-form">

<input
type="text"
placeholder="Business Name"
required>

<input
type="text"
placeholder="Owner Name"
required>

<input
id="email"
type="email"
placeholder="Email Address"
required>

<input
type="tel"
placeholder="Phone Number"
required>

<input
type="text"
placeholder="Business Address"
required>

<textarea
placeholder="Products You Sell"
required></textarea>

<input
id="seller-password"
type="password"
placeholder="Password"
required>

<input
id="seller-confirm-password"
type="password"
placeholder="Confirm Password"
required>

<p id="seller-password-message"></p>

<button type="submit">

Submit Application

</button>

</form>

<div class="notice">

Seller accounts require admin approval.

</div>

<p class="login-link">

Already approved?

<a href="seller-login.html">

Login

</a>

</p>

</div>

</section>


<footer>

<p>

© 2026 Online Gambia Marketplace

</p>

</footer>

</div>

<script src="script.js"></script>

</body>

</html>
